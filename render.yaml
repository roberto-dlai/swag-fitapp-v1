services:
  - type: web
    name: fitcheck
    runtime: node
    plan: free
    # migrate.js is idempotent (skips already-applied migrations), so running it
    # on every boot is safe and avoids needing a paid pre-deploy command.
    buildCommand: npm install
    startCommand: node scripts/migrate.js && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true        # Render generates a long random value (>32 chars)
      - key: NODE_ENV
        value: production
      # --- Set these manually in the dashboard (sync:false leaves them blank) ---
      - key: DATABASE_URL           # Internal Database URL of your existing Render Postgres
        sync: false
      - key: MONGODB_URI            # from MongoDB Atlas, e.g. mongodb+srv://...
        sync: false
      - key: WEATHER_API_KEY        # OpenWeatherMap key (or any non-empty placeholder)
        sync: false
      - key: CORS_ORIGIN            # your Render URL, e.g. https://fitcheck.onrender.com
        sync: false
