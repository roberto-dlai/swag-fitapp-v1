<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitCheck — Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css?v=2">
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-brand">
        <h1>FitCheck</h1>
        <span class="header-powered-by">Powered by DeepLearning.ai</span>
      </div>
      <div class="header-right">
        <span id="streak-badge" class="streak-badge hidden" aria-label="Workout streak"></span>
        <span id="user-name" class="user-name"></span>
        <button id="logout-btn" class="btn btn-outline btn-sm">Log Out</button>
      </div>
    </header>

    <!-- Dashboard Grid -->
    <div class="dashboard-grid">

      <!-- Weather Widget -->
      <section class="card" aria-label="Current weather">
        <div class="card-header">
          <h2>Weather</h2>
        </div>
        <div id="weather-widget">
          <div class="loading-state"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

      <!-- Today's Workout -->
      <section class="card today-workout" aria-label="Today's workout">
        <div class="card-header">
          <h2>Today's Workout Plan</h2>
          <div>
            <select id="workout-type-select" class="select-sm" aria-label="Select workout type">
              <option value="weight_loss">Cardio</option>
              <option value="strength">Strength</option>
              <option value="endurance">Endurance</option>
            </select>
          </div>
        </div>
        <div id="today-workout">
          <div class="loading-state"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

      <!-- 7-Day Plan -->
      <section class="card full-width" aria-label="7-day workout plan">
        <div class="card-header">
          <h2>7-Day Plan</h2>
        </div>
        <div id="weekly-plan">
          <div class="loading-state"><span class="loading-spinner"></span> Loading...</div>
        </div>
        <p class="plan-note">When the temperature exceeds 95°F (35°C), FitCheck recommends indoor workouts. Otherwise, outdoor workouts are recommended.</p>
      </section>

      <!-- Profile / Preferences -->
      <section class="card" aria-label="Profile and preferences">
        <div class="card-header">
          <h2>Preferences</h2>
        </div>
        <form id="profile-form" class="profile-form">
          <div class="form-row">
            <div class="form-group">
              <label for="pref-unit">Units</label>
              <select id="pref-unit" name="unit_pref">
                <option value="imperial">°F</option>
                <option value="metric">°C</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="pref-location">Location</label>
            <input type="text" id="pref-location" name="location" placeholder="City name">
          </div>
          <button type="submit" class="btn btn-primary btn-sm">Save Preferences</button>
        </form>
      </section>

      <!-- Community Reviews -->
      <section class="card" aria-label="Community reviews">
        <div class="card-header">
          <h2>Community Reviews</h2>
        </div>
        <div id="reviews-section">
          <div class="loading-state"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="/js/api.js?v=2"></script>
  <script src="/js/notifications.js?v=2"></script>
  <script src="/js/weatherWidget.js?v=2"></script>
  <script src="/js/workoutCards.js?v=2"></script>
  <script src="/js/reviewSection.js?v=2"></script>
  <script src="/js/dashboard.js?v=2"></script>
  <script src="/js/app.js?v=2"></script>
</body>
</html>
