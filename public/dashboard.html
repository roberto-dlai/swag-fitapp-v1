<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitCheck — Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css?v=12">
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-brand">
        <h1>FitCheck</h1>
        <span class="header-powered-by">Powered by DeepLearning.ai</span>
      </div>
      <div class="header-right">
        <span id="user-name" class="user-name"></span>
        <button id="logout-btn" class="btn btn-outline btn-sm">Log Out</button>
      </div>
    </header>

    <!-- Dashboard Grid -->
    <div class="dashboard-grid">

      <!-- New Workout -->
      <section class="card" aria-label="New workout">
        <div class="card-header">
          <h2>New Workout</h2>
        </div>
        <div class="workout-controls">
          <div class="workout-field">
            <label for="workout-type-select" class="select-label">Workout Type</label>
            <select id="workout-type-select" class="select-sm" aria-label="Select workout type">
              <option value="weight_loss">Cardio</option>
              <option value="strength">Strength</option>
              <option value="endurance">Endurance</option>
            </select>
          </div>
          <div class="workout-field">
            <label for="workout-date" class="select-label">Date</label>
            <input type="date" id="workout-date" class="select-sm" aria-label="Workout date" max="">
          </div>
          <div class="workout-field">
            <label for="workout-duration" class="select-label">Duration (hrs)</label>
            <select id="workout-duration" class="select-sm" aria-label="Workout duration">
              <option value="30">0.5</option>
              <option value="60" selected>1</option>
              <option value="90">1.5</option>
              <option value="120">2</option>
              <option value="150">2.5</option>
            </select>
          </div>
          <div class="workout-field">
            <label for="workout-location" class="select-label">Location</label>
            <select id="workout-location" class="select-sm" aria-label="Select location">
              <option value="Boston">Boston</option>
              <option value="Chicago">Chicago</option>
              <option value="Miami">Miami</option>
              <option value="New York" selected>New York</option>
              <option value="San Francisco">San Francisco</option>
              <option value="Seattle">Seattle</option>
            </select>
          </div>
        </div>
        <div class="workout-log-bar">
          <button id="complete-workout-btn" class="btn btn-success btn-sm">Add Workout</button>
        </div>
      </section>

      <!-- Weather Widget -->
      <section class="card" aria-label="Current weather">
        <div class="card-header">
          <h2>Weather</h2>
        </div>
        <div id="weather-widget">
          <div class="loading-state"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

      <!-- Total Workouts Widget -->
      <section class="card" aria-label="Total workouts">
        <div class="card-header">
          <h2>Total Workouts</h2>
        </div>
        <div id="total-workouts">
          <div class="loading-state"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

      <!-- Recent Workouts -->
      <section class="card full-width" aria-label="Recent workout history">
        <div class="card-header">
          <h2>Recent Workouts</h2>
        </div>
        <div id="weekly-plan">
          <div class="loading-state"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

      <!-- Profile / Preferences -->
      <section class="card" aria-label="Profile and preferences">
        <div class="card-header">
          <h2>Preferences</h2>
        </div>
        <form id="profile-form" class="profile-form">
          <div class="form-row">
            <div class="form-group">
              <label for="pref-unit">Units</label>
              <select id="pref-unit" name="unit_pref">
                <option value="imperial">°F</option>
                <option value="metric">°C</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-sm">Save Preferences</button>
        </form>
      </section>

      <!-- Community Reviews -->
      <section class="card" aria-label="Community reviews">
        <div class="card-header">
          <h2>Community Reviews</h2>
        </div>
        <div id="reviews-section">
          <div class="loading-state"><span class="loading-spinner"></span> Loading...</div>
        </div>
      </section>

    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="/js/utils.js?v=12"></script>
  <script src="/js/api.js?v=12"></script>
  <script src="/js/notifications.js?v=12"></script>
  <script src="/js/weatherWidget.js?v=12"></script>
  <script src="/js/workoutCards.js?v=12"></script>
  <script src="/js/reviewSection.js?v=12"></script>
  <script src="/js/dashboard.js?v=12"></script>
  <script src="/js/app.js?v=12"></script>
</body>
</html>
