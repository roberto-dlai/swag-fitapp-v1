<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitCheck — Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-container">
      <h1 class="auth-logo">FitCheck</h1>
      <p class="auth-tagline">Personalized workouts, powered by weather</p>

      <!-- Login Form -->
      <form id="login-form" class="auth-form" aria-label="Login form">
        <h2>Log In</h2>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">Log In</button>
        <p class="auth-switch">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="auth-form hidden" aria-label="Sign up form">
        <h2>Sign Up</h2>
        <div class="form-group">
          <label for="signup-name">Name</label>
          <input type="text" id="signup-name" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary">Sign Up</button>
        <p class="auth-switch">Already have an account? <a href="#" id="show-login">Log in</a></p>
      </form>

      <div id="auth-error" class="error-message hidden" role="alert"></div>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
