services:
  app:
    build: .
    ports:
      - "8080:3000"
    environment:
      - DATABASE_URL=postgresql://fitcheck:fitcheck@postgres:5432/fitcheck
      - MONGODB_URI=mongodb://mongo:27017/fitcheck
      - JWT_SECRET=docker-dev-secret-must-be-at-least-32-characters-long
      - WEATHER_API_KEY=${WEATHER_API_KEY:-demo-key}
      - CORS_ORIGIN=http://localhost:8080
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=fitcheck
      - POSTGRES_USER=fitcheck
      - POSTGRES_PASSWORD=fitcheck
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitcheck"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  mongodata:
